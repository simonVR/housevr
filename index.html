<a-scene>

  <!-- CAMERA RIG -->
  <a-entity id="rig" position="0 0 3">
    <a-entity id="camera" camera look-controls position="0 1.6 0"></a-entity>

    <!-- RIGHT HAND -->
    <a-entity
      id="rightHand"
      laser-controls="hand: right"
      raycaster="objects: .teleportable; far: 20">
    </a-entity>

    <!-- LEFT HAND -->
    <a-entity
      id="leftHand"
      laser-controls="hand: left"
      raycaster="objects: .teleportable; far: 20">
    </a-entity>
  </a-entity>

  <!-- FLOOR (invisible, slightly lowered) -->
  <a-plane
    class="teleportable"
    rotation="-90 0 0"
    position="0 -0.01 0"
    width="50"
    height="50"
    material="opacity: 0; transparent: true">
  </a-plane>

  <!-- TELEPORT MARKER -->
  <a-circle
    id="marker"
    radius="0.2"
    rotation="-90 0 0"
    color="red"
    visible="false">
  </a-circle>

  <!-- MODEL -->
  <a-entity gltf-model="HouseBefore.glb"></a-entity>

  <!-- LIGHTING -->
  <a-light type="ambient" intensity="0.5"></a-light>
  <a-light type="directional" position="5 10 5"></a-light>

  <a-sky color="#e6f2ff"></a-sky>

</a-scene>

<script>
  const rig = document.getElementById('rig');
  const marker = document.getElementById('marker');
  const rightHand = document.getElementById('rightHand');

  let lastHit = null;

  // Track where the laser is pointing
  rightHand.addEventListener('raycaster-intersection', function (e) {
    const intersection = e.detail.intersections[0];
    if (intersection) {
      lastHit = intersection.point;

      marker.setAttribute('position', lastHit);
      marker.setAttribute('visible', true);
    }
  });

  rightHand.addEventListener('raycaster-intersection-cleared', function () {
    marker.setAttribute('visible', false);
    lastHit = null;
  });

  // TELEPORT on trigger (WebXR "select")
  rightHand.addEventListener('selectstart', function () {
    if (!lastHit) return;

    rig.setAttribute('position', {
      x: lastHit.x,
      y: 0,
      z: lastHit.z
    });
  });
</script>
