<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
  </head>

  <body>
    <a-scene>

      <!-- Camera rig (movement + teleport) -->
      <a-entity id="rig" movement-controls="speed: 0.1">
        <a-entity camera position="0 1.6 3" look-controls></a-entity>
      </a-entity>

      <!-- Controllers -->
      <a-entity laser-controls="hand: right"></a-entity>
      <a-entity laser-controls="hand: left"></a-entity>

      <!-- Teleportable floor -->
      <a-plane 
        position="0 0 0" 
        rotation="-90 0 0" 
        width="50" 
        height="50" 
        color="#ccc">
      </a-plane>

      <!-- MODEL A (original layout) -->
      <a-entity 
        id="modelA"
        gltf-model="HouseBefore.glb"
        position="0 0 0"
        visible="true">
      </a-entity>

      <!-- MODEL B (modified layout) -->
      <a-entity 
        id="modelB"
        gltf-model="HouseAfter.glb"
        position="0 0 0"
        visible="false">
      </a-entity>

      <!-- SUN LIGHT -->
      <a-light 
        type="directional" 
        position="5 10 5" 
        intensity="1.2">
      </a-light>

      <a-light type="ambient" intensity="0.4"></a-light>

      <!-- Sky -->
      <a-sky color="#e6f2ff"></a-sky>

    </a-scene>

    <script>
      // Toggle models on controller button press
      let showingA = true;

      document.addEventListener('keydown', (e) => {
        if (e.key === 'a' || e.key === 'x') toggleModels();
      });

      // Quest controller buttons
      document.querySelector('a-scene').addEventListener('abuttondown', toggleModels);
      document.querySelector('a-scene').addEventListener('xbuttondown', toggleModels);

      function toggleModels() {
        const modelA = document.getElementById('modelA');
        const modelB = document.getElementById('modelB');

        showingA = !showingA;

        modelA.setAttribute('visible', showingA);
        modelB.setAttribute('visible', !showingA);
      }
    </script>

  </body>
</html>
